name: netbsd

on:
  workflow_dispatch:
    inputs:
      verison:
        description: 'OpenSSL Version'
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.verison }}
      cancel-in-progress: true
    name: x86_64-unknown-netbsd - 9.4

    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            export BUILD_VERSION_V="v${GITHUB_REF##*/v}"
          else
            export BUILD_VERSION_V="${{ inputs.verison }}"
          fi
          echo "version=${BUILD_VERSION_V#v}" >> $GITHUB_OUTPUT

      - name: Compile in NetBSD
        uses: vmactions/netbsd-vm@v1
        with:
          release: '9.4'
          usesh: true
          prepare: |
            /usr/sbin/pkg_add curl perl
            [ -x /usr/pkg/sbin/mozilla-rootcerts ] || /usr/sbin/pkg_add mozilla-rootcerts
            /usr/pkg/sbin/mozilla-rootcerts install || true

          run: |
            export ROOT_DIR="$(pwd)"
            export TRIPLET="x86_64-unknown-netbsd"
            export OPENSSL_VERSION="${{ steps.version.outputs.version }}"
            echo "OpenSSL Version: ${OPENSSL_VERSION}"
            export PERFIX_DIR="/tmp/openssl-${TRIPLET}"
            mkdir -p "${PERFIX_DIR}"
            for _ca in /usr/pkg/etc/openssl/certs /etc/openssl/certs /etc/ssl/certs; do
              [ -f "${_ca}/ca-certificates.crt" ] && export CURL_CA_BUNDLE="${_ca}/ca-certificates.crt" && break
            done
            case "${OPENSSL_VERSION}" in
              3.*|4.*)
                curl -fSL "https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz" -o "openssl-${OPENSSL_VERSION}.tar.gz"
                ;;
              1.1.1*)
                curl -fSL "https://openssl.org/source/old/1.1.1/openssl-${OPENSSL_VERSION}.tar.gz" -o "openssl-${OPENSSL_VERSION}.tar.gz"
                ;;
              *)
                echo "Unsupported version: ${OPENSSL_VERSION}"
                exit 1
                ;;
            esac
            tar -xzf "openssl-${OPENSSL_VERSION}.tar.gz" && rm -f "openssl-${OPENSSL_VERSION}.tar.gz"
            cd "openssl-${OPENSSL_VERSION}"
            case "${OPENSSL_VERSION}" in
              3.*|4.*)
                ./Configure --prefix="${PERFIX_DIR}" --openssldir="${PERFIX_DIR}" no-tests
                ;;
              1.1.1*)
                ./config --prefix="${PERFIX_DIR}" --openssldir="${PERFIX_DIR}"
                ;;
            esac

            make -j$(getconf NPROCESSORS_ONLN)
            make -j$(getconf NPROCESSORS_ONLN) install_sw
            make -j$(getconf NPROCESSORS_ONLN) install_ssldirs

            cd "${PERFIX_DIR}"
            tar -czf "${ROOT_DIR}/openssl-${TRIPLET}.tar.gz" .
            cd "${ROOT_DIR}"
            printf '%s  %s\n' "$(sha256 -q "openssl-${TRIPLET}.tar.gz")" "openssl-${TRIPLET}.tar.gz" | tee "openssl-${TRIPLET}.tar.gz.sha256"

      - name: Upload binaries
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: |
            openssl-*.tar.gz
            openssl-*.tar.gz.sha256
